<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register a service · Georgians in Belgium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BPG+Arial&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="brand">geosin<span class="accent">.</span>be</a>
    <a href="/">FAQ</a>
    <a href="/services.html" class="active">Services</a>
  </nav>

  <main class="container">
    <h1>Register a service</h1>
    <p class="subtitle">List your service so other Georgians in Belgium can find you. Free, public, no commission.</p>

    <section class="form-section">
      <form id="service-form">

        <div class="field">
          <label for="category">What service do you offer?
            <span class="hint">Pick the closest category</span>
          </label>
          <select id="category" name="category" required>
            <option value="">— pick a category —</option>
            <option>Driver / Transport</option>
            <option>Plumber / Electrician / Handyman</option>
            <option>Cleaner</option>
            <option>Dutch / French / English Teacher</option>
            <option>Translator / Interpreter</option>
            <option>Childcare / Babysitter</option>
            <option>Hairdresser / Beauty</option>
            <option>IT / Web / Tech</option>
            <option>Photographer / Video</option>
            <option>Mover</option>
            <option>Restaurant / Catering</option>
            <option>Other</option>
          </select>
        </div>

        <div class="field">
          <label for="name">Your name or business name</label>
          <input type="text" id="name" name="name" required maxlength="80">
        </div>

        <div class="field">
          <label for="description">Short description
            <span class="hint">2–3 sentences. What you do, what makes you a good choice.</span>
          </label>
          <textarea id="description" name="description" required maxlength="500"></textarea>
        </div>

        <div class="field">
          <label for="region">City or region you serve</label>
          <input type="text" id="region" name="region" placeholder="e.g. Brussels, Ghent, all of Flanders" required maxlength="80">
        </div>

        <div class="field">
          <label for="languages">Languages you speak</label>
          <input type="text" id="languages" name="languages" placeholder="e.g. Georgian, English, Dutch" required maxlength="80">
        </div>

        <div class="field">
          <label for="email">Contact email</label>
          <input type="email" id="email" name="email" required maxlength="120">
        </div>

        <div class="field">
          <label for="phone">Phone (optional)</label>
          <input type="tel" id="phone" name="phone" maxlength="40">
        </div>

        <div class="field">
          <label for="link">Website or social profile (optional)</label>
          <input type="url" id="link" name="link" placeholder="https://..." maxlength="200">
        </div>

        <button type="submit" class="submit-btn">Submit for review</button>

        <div id="success" class="success hidden" role="status">
          <strong>Thanks!</strong> Your submission has been received. We'll review it and publish it within a few days.
        </div>

        <div id="error" class="error hidden" role="alert"></div>

      </form>
    </section>

    <footer>
      <p>Built by Nikoloz · 2026 · <a href="/">back to FAQ</a></p>
    </footer>
  </main>

  <!-- Supabase JavaScript client library, loaded from a CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Connect to your Supabase project. Both values below are safe to publish —
    // Row Level Security policies in the database control what they can actually do.
    const SUPABASE_URL = 'https://kikvckuaorpspxhtnpzd.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FsuRAVFjLNQ1q650FHw2cA_UhtakskW';

    (function() {
      // Create a Supabase client. This object is what we use to query the database.
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const form = document.getElementById('service-form');
      const success = document.getElementById('success');
      const errorBox = document.getElementById('error');
      const submitBtn = form.querySelector('.submit-btn');

      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        // Hide any previous status messages.
        success.classList.add('hidden');
        errorBox.classList.add('hidden');

        // Disable the button and change its label so the user knows we're working.
        submitBtn.disabled = true;
        const originalLabel = submitBtn.textContent;
        submitBtn.textContent = 'Submitting…';

        // Build the row to insert. .trim() removes accidental leading/trailing spaces.
        // Empty optional fields become null so they look clean in the database.
        const row = {
          category: form.category.value.trim(),
          name: form.name.value.trim(),
          description: form.description.value.trim(),
          region: form.region.value.trim(),
          languages: form.languages.value.trim(),
          email: form.email.value.trim(),
          phone: form.phone.value.trim() || null,
          link: form.link.value.trim() || null
        };

        // Send the INSERT request. Supabase returns { data, error } — error is null on success.
        const { error } = await supabase.from('services').insert(row);

        // Re-enable the button regardless of outcome.
        submitBtn.disabled = false;
        submitBtn.textContent = originalLabel;

        if (error) {
          // Friendly inline error for the user; technical details go to the browser console.
          errorBox.textContent = 'Sorry — something went wrong. Please try again, or email if it keeps failing.';
          errorBox.classList.remove('hidden');
          errorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
          console.error('Supabase insert error:', error);
          return;
        }

        // Success — show the message, scroll to it, and clear the form for the next submission.
        success.classList.remove('hidden');
        success.scrollIntoView({ behavior: 'smooth', block: 'center' });
        form.reset();
      });
    })();
  </script>
</body>
</html>
