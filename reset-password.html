<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — geosin.be</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-page { min-height: calc(100vh - var(--nav-h)); padding: 48px 24px; background: var(--surface); }
    .auth-card { max-width: 420px; margin: 0 auto; background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-md); padding: 36px 32px; }
    .auth-card h1 { font-size: 24px; margin-bottom: 6px; }
    .auth-card .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form label { display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; }
    .auth-form input { padding: 11px 13px; border: 1px solid var(--hairline); border-radius: var(--r-sm); font-size: 14px; font-family: inherit; }
    .auth-form input:focus { outline: none; border-color: var(--rausch); box-shadow: 0 0 0 3px rgba(255,56,92,0.15); }
    .auth-card .btn-primary { margin-top: 8px; padding: 12px 16px; font-size: 14px; }
    .auth-msg { margin-top: 14px; padding: 12px 14px; border-radius: var(--r-sm); font-size: 13px; line-height: 1.5; }
    .auth-msg.error   { background: #fff0f2; color: #c20030; border: 1px solid #ffd4dc; }
    .auth-msg.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
  </style>
</head>
<body>

<nav class="site-nav" id="site-nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-mark">G</div>
      <span class="nav-logo-text">geosin<span>.be</span></span>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="jobs.html">Jobs</a>
      <a href="housing.html">Housing</a>
      <a href="services.html">Services</a>
      <a href="events.html">Events</a>
      <a href="forum.html">Forum</a>
      <a href="checklists.html">Checklists</a>
      <a href="scams.html">Avoid Scams</a>
      <a href="about.html">About</a>
    </div>
    <div class="nav-actions" id="nav-actions"></div>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <h1>Choose a new password</h1>
    <p class="subtitle">Enter a new password for your account.</p>

    <form class="auth-form" id="reset-form">
      <label>
        New password
        <input type="password" name="password" required minlength="8" autocomplete="new-password" />
      </label>
      <button type="submit" class="btn btn-primary">Update password</button>
    </form>
    <div id="msg"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js?v=5"></script>
<script>
  const form = document.getElementById('reset-form');
  const msg  = document.getElementById('msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.innerHTML = '';
    const password = new FormData(form).get('password');
    const { error } = await sb.auth.updateUser({ password });
    if (error) {
      msg.innerHTML = `<div class="auth-msg error">${error.message}</div>`;
    } else {
      msg.innerHTML = `<div class="auth-msg success">Password updated. Redirecting…</div>`;
      setTimeout(() => location.href = 'account.html', 1200);
    }
  });
</script>

</body>
</html>
