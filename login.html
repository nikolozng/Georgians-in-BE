<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — geosin.be</title>
  <meta name="description" content="Log in to geosin.be." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-page { min-height: calc(100vh - var(--nav-h)); padding: 48px 24px; background: var(--surface); }
    .auth-card {
      max-width: 420px; margin: 0 auto;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      padding: 36px 32px;
    }
    .auth-card h1 { font-size: 24px; margin-bottom: 6px; }
    .auth-card .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form label { display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; }
    .auth-form input {
      padding: 11px 13px; border: 1px solid var(--hairline);
      border-radius: var(--r-sm); font-size: 14px; font-family: inherit;
    }
    .auth-form input:focus { outline: none; border-color: var(--rausch); box-shadow: 0 0 0 3px rgba(255,56,92,0.15); }
    .auth-card .btn-primary { margin-top: 8px; padding: 12px 16px; font-size: 14px; }
    .auth-foot { margin-top: 22px; text-align: center; font-size: 13px; color: var(--muted); }
    .auth-foot a { color: var(--rausch); text-decoration: none; font-weight: 600; }
    .forgot { text-align: right; font-size: 12px; }
    .forgot a { color: var(--muted); text-decoration: none; }
    .forgot a:hover { color: var(--rausch); }
    .auth-msg { margin-top: 14px; padding: 12px 14px; border-radius: var(--r-sm); font-size: 13px; line-height: 1.5; }
    .auth-msg.error   { background: #fff0f2; color: #c20030; border: 1px solid #ffd4dc; }
    .auth-msg.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
  </style>
</head>
<body>

<nav class="site-nav" id="site-nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-mark">G</div>
      <span class="nav-logo-text">geosin<span>.be</span></span>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="jobs.html">Jobs</a>
      <a href="housing.html">Housing</a>
      <a href="services.html">Services</a>
      <a href="events.html">Events</a>
      <a href="checklists.html">Checklists</a>
      <a href="scams.html">Avoid Scams</a>
      <a href="about.html">About</a>
      <a href="forum.html">Forum</a>
    </div>
    <div class="nav-actions" id="nav-actions">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" data-lang="ka" onclick="setLang('ka')">KA</button>
      </div>
    </div>
    <div class="nav-hamburger" onclick="toggleMobileNav()"><span></span><span></span><span></span></div>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <h1>
      <span data-lang-block="en">Welcome back</span>
      <span data-lang-block="ka" class="ka" style="display:block;font-family:var(--font-georgian)">კეთილი იყოს თქვენი დაბრუნება</span>
    </h1>
    <p class="subtitle">
      <span data-lang-block="en">Log in to manage your posts and the forum.</span>
      <span data-lang-block="ka" class="ka" style="display:block;font-family:var(--font-georgian)">შედით თქვენი პოსტებისა და ფორუმის სამართავად.</span>
    </p>

    <form class="auth-form" id="login-form">
      <label>
        Email<span class="req">*</span>
        <input type="email" name="email" required autocomplete="email" />
      </label>
      <label>
        Password<span class="req">*</span>
        <input type="password" name="password" required autocomplete="current-password" />
      </label>
      <div class="forgot"><a href="#" id="forgot-link">Forgot password?</a></div>
      <button type="submit" class="btn btn-primary">Log in</button>
    </form>

    <div id="msg"></div>

    <div class="auth-foot">
      No account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <span>&copy; 2025 geosin.be</span>
      <span><a href="mailto:hello@geosin.be">hello@geosin.be</a></span>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js?v=3"></script>
<script>
  function setLang(lang) {
    localStorage.setItem('geosin-lang', lang);
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    document.querySelectorAll('[data-lang-block]').forEach(el => { el.style.display = el.dataset.langBlock === lang ? '' : 'none'; });
    document.documentElement.lang = lang === 'ka' ? 'ka' : 'en';
  }
  function toggleMobileNav() {
    const nav = document.getElementById('site-nav');
    const opened = nav.classList.toggle('nav-mobile-open');
    document.body.classList.toggle('has-mobile-nav-open', opened);
  }
  setLang(localStorage.getItem('geosin-lang') || 'en');

  AUTH.getUser().then(u => { if (u) location.href = new URLSearchParams(location.search).get('next') || 'account.html'; });

  const form = document.getElementById('login-form');
  const msg  = document.getElementById('msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.innerHTML = '';
    const fd = new FormData(form);
    const email = fd.get('email').trim();
    const password = fd.get('password');

    const submitBtn = form.querySelector('button[type=submit]');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Logging in…';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      msg.innerHTML = `<div class="auth-msg error">${error.message}</div>`;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Log in';
      return;
    }

    const next = new URLSearchParams(location.search).get('next') || 'account.html';
    location.href = next;
  });

  document.getElementById('forgot-link').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = form.querySelector('input[name=email]').value.trim();
    if (!email) {
      msg.innerHTML = `<div class="auth-msg error">Enter your email above first, then click "Forgot password?"</div>`;
      return;
    }
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: location.origin + '/reset-password.html'
    });
    if (error) {
      msg.innerHTML = `<div class="auth-msg error">${error.message}</div>`;
    } else {
      msg.innerHTML = `<div class="auth-msg success">Check your email for a password reset link.</div>`;
    }
  });
</script>

</body>
</html>
